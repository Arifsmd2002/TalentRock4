<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Talentrock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <img th:src="@{/images/logo.png}" alt="Logo">
            Talentrock
        </a>
        <ul class="navbar-nav">
            <li><a href="/" class="nav-link">Home</a></li>
            <li><a href="/about" class="nav-link">About</a></li>
            <li><a href="/contact" class="nav-link active">Contact</a></li>
            <li><a href="/login" class="btn btn-primary btn-sm" style="margin-left:8px">Get Started</a></li>
        </ul>
    </nav>

    <div class="contact-container animate-fade">
        <div class="contact-header">
            <span class="section-tag">📬 Contact Support</span>
            <h1 class="gradient-text">Get in Touch</h1>
            <p>Have a question or need support? We're here to help you scale.</p>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="contact-wrapper">
            <!-- Contact Info Sidebar -->
            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">📧</div>
                    <div>
                        <h4>Email Us</h4>
                        <p>support@talentrock.in</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">🌐</div>
                    <div>
                        <h4>Website</h4>
                        <p>www.talentrock.in</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">📍</div>
                    <div>
                        <h4>Office</h4>
                        <p>Mumbai, Maharashtra</p>
                    </div>
                </div>
                <div class="social-links">
                    <span>Follow us:</span>
                    <div class="social-icons">
                        <a href="#">LinkedIn</a>
                        <a href="#">Twitter</a>
                    </div>
                </div>
            </div>

            <!-- Professional Form -->
            <div class="contact-form-card">
                <form th:action="@{/contact/send}" method="post" id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="John Doe"
                                th:value="${user != null ? user.fullName : ''}" required />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="john@example.com"
                                th:value="${user != null ? user.email : ''}" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Your Query</label>
                        <textarea name="message" class="form-control" rows="4" placeholder="How can we help you?"
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Rate your Experience</label>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Send Message <span style="margin-left:8px;">📨</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Extra Styles for Contact Page -->
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        .contact-container {
            padding: 120px 2rem 6rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .contact-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 1rem 0;
        }

        .contact-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 3rem;
            align-items: start;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .info-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-card h4 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .info-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .contact-form-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding: 0.8rem 1.2rem !important;
            border-radius: 12px !important;
            transition: all 0.3s ease !important;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1) !important;
        }

        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
            font-size: 2rem;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            color: #444;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating :checked ~ label {
            color: #ffca08;
        }

        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffca08;
        }

        .btn-block {
            width: 100%;
            padding: 1rem !important;
            font-size: 1.1rem !important;
            font-weight: 700 !important;
            margin-top: 1rem;
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            font-weight: 600;
            text-align: center;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        @media (max-width: 768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .contact-form-card {
                padding: 1.5rem;
            }
            .contact-header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</body>

</html>
