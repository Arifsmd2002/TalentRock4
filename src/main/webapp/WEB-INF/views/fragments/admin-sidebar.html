<!-- ADMIN SIDEBAR FRAGMENT -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="admin-sidebar" class="sidebar">
        <a href="/" class="sidebar-brand">
            <img th:src="@{/images/logo.png}" alt="Talentrock Logo" style="width:32px; height:32px; border-radius:8px;">
            Talentrock
        </a>
        <div class="sidebar-section">
            <div class="sidebar-label">Admin Panel</div>
            <a href="/admin/dashboard" class="sidebar-link"
                th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="/admin/users" class="sidebar-link" th:classappend="${currentPage == 'users' ? 'active' : ''}">
                <span class="icon">👥</span> Manage Users
            </a>
            <a href="/admin/projects" class="sidebar-link"
                th:classappend="${currentPage == 'projects' ? 'active' : ''}">
                <span class="icon">📋</span> All Projects
            </a>
            <a href="/admin/subscriptions" class="sidebar-link"
                th:classappend="${currentPage == 'subscriptions' ? 'active' : ''}">
                <span class="icon">💳</span> Subscriptions
            </a>
            <a href="/admin/messages" class="sidebar-link" th:classappend="${currentPage == 'messages' ? 'active' : ''}"
                style="position:relative;">
                <span class="icon">📬</span> Messages
                <span id="unread-messages-badge" th:if="${unreadMessages != null and unreadMessages > 0}"
                    th:text="${unreadMessages}"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#ef4444;color:#fff;border-radius:999px;font-size:0.68rem;font-weight:700;padding:0.1rem 0.45rem;min-width:18px;text-align:center;"></span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="flex items-center gap-2" style="margin-bottom:12px;" th:if="${user != null}">
                <div class="avatar"
                    th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'A'}">A</div>
                <div>
                    <div style="font-size:0.9rem; font-weight:600;"
                        th:text="${user.fullName != null ? user.fullName : user.username}">Admin</div>
                    <div class="text-muted text-xs" style="color:var(--error);">🛡️ Administrator</div>
                </div>
            </div>
            <a href="/logout" class="btn btn-ghost btn-sm" style="width:100%; justify-content:center;">Sign Out</a>
        </div>

        <!-- Polling Script for "Instant" Notifications -->
        <script th:inline="javascript">
            function refreshUnreadCount() {
                fetch('/notifications/count')
                    .then(response => response.json())
                    .then(data => {
                        const badge = document.getElementById('unread-messages-badge');
                        if (data.count > 0) {
                            if (badge) {
                                badge.innerText = data.count;
                                badge.style.display = 'block';
                            } else {
                                // Create badge if it doesn't exist
                                // (Logic omitted for brevity in sidebar, usually badge is always there if > 0)
                            }
                        } else if (badge) {
                            badge.style.display = 'none';
                        }
                    })
                    .catch(e => console.error("Notification polling failed", e));
            }
            // Poll every 30 seconds
            // setInterval(refreshUnreadCount, 30000);
        </script>
    </div>
</body>

</html>
