<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Talentrock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--bg-base);">
    <div style="position:fixed; inset:0; pointer-events:none; z-index:0;">
        <div
            style="position:absolute; width:500px; height:500px; border-radius:50%; background:var(--primary); filter:blur(120px); opacity:0.12; top:-100px; left:-100px;">
        </div>
    </div>

    <div style="position:relative; z-index:1; width:100%; max-width:440px; padding:2rem;">
        <div class="text-center mb-4">
            <a href="/" class="navbar-brand" style="justify-content:center; font-size:2rem; display:flex;">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:48px;height:48px;border-radius:14px;">
                Talentrock
            </a>
            <h2 class="mt-4" style="font-size:1.4rem;">Reset Your Password</h2>
            <p class="text-secondary-color mt-2" style="font-size:0.9rem;">Enter your email to receive reset
                instructions</p>
        </div>

        <div class="card">
            <div class="card-body">
                <form action="#" method="post">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="john@example.com" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;"
                        onclick="alert('Password reset link sent to your email!')">Send Link 📧</button>
                </form>

                <div class="text-center mt-3">
                    <a href="/login" class="text-primary-color text-sm font-semibold">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
