<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP | Talentrock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--bg-base);">

    <!-- Background orbs -->
    <div style="position:fixed; inset:0; pointer-events:none; z-index:0;">
        <div
            style="position:absolute; width:500px; height:500px; border-radius:50%; background:var(--primary); filter:blur(120px); opacity:0.12; top:-100px; left:-100px;">
        </div>
        <div
            style="position:absolute; width:400px; height:400px; border-radius:50%; background:var(--secondary); filter:blur(120px); opacity:0.1; bottom:-80px; right:-80px;">
        </div>
    </div>

    <div style="position:relative; z-index:1; width:100%; max-width:440px; padding:2rem;">
        <div class="text-center mb-4">
            <h2 style="font-size:1.4rem; color: var(--text-base);">Verify OTP</h2>
            <p class="text-secondary-color mt-2" style="font-size:0.95rem;">Please enter the 6-digit code sent to your
                email.</p>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

                <form th:action="@{/verify-reset-otp}" method="post">
                    <input type="hidden" name="email" th:value="${email}" />
                    <div class="form-group">
                        <label class="form-label">OTP Code</label>
                        <input type="text" name="otp" class="form-control" placeholder="X X X X X X" required
                            maxlength="6" />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Verify
                        Code</button>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/forgot-password}" class="text-primary-color text-sm font-semibold">Change Email</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
