<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Talentrock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--bg-base);">

    <!-- Background orbs -->
    <div style="position:fixed; inset:0; pointer-events:none; z-index:0;">
        <div
            style="position:absolute; width:500px; height:500px; border-radius:50%; background:var(--primary); filter:blur(120px); opacity:0.12; top:-100px; left:-100px;">
        </div>
        <div
            style="position:absolute; width:400px; height:400px; border-radius:50%; background:var(--secondary); filter:blur(120px); opacity:0.1; bottom:-80px; right:-80px;">
        </div>
    </div>

    <div style="position:relative; z-index:1; width:100%; max-width:440px; padding:2rem;">
        <div class="text-center mb-4">
            <a href="/" class="navbar-brand" style="justify-content:center; font-size:2rem; display:flex;">
                <img th:src="@{/images/logo.png}" alt="Logo" style="width:48px;height:48px;border-radius:14px;">
                Talentrock
            </a>
            <h2 class="mt-4" style="font-size:1.4rem; color: var(--text-base);">Set New Password</h2>
            <p class="text-secondary-color mt-2" style="font-size:0.95rem;">Choose a secure password for your account
            </p>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/reset-password}" method="post">
                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
                            required minlength="6" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirm_password" class="form-control" placeholder="••••••••"
                            required minlength="6" />
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;" id="submit-btn"
                        disabled>Reset Password →</button>
                </form>

                <script>
                    const password = document.getElementById("password");
                    const confirm = document.getElementById("confirm_password");
                    const submit = document.getElementById("submit-btn");

                    function validate() {
                        if (password.value === confirm.value && password.value.length >= 6) {
                            submit.disabled = false;
                            confirm.style.borderColor = "#10b981";
                        } else {
                            submit.disabled = true;
                            if (confirm.value.length > 0) confirm.style.borderColor = "#ef4444";
                        }
                    }

                    password.addEventListener("input", validate);
                    confirm.addEventListener("input", validate);
                </script>

                <div class="text-center mt-3">
                    <a href="/login" class="text-primary-color text-sm font-semibold">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
